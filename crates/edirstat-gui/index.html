<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101014" />
    <title>eDirStat — Web Snapshot Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #101014;
        overscroll-behavior: none;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
      #loading_text {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #9ca3af;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="edirstat_canvas"></canvas>
    <div id="loading_text">Loading eDirStat…</div>
    <!-- JS glue emitted by `wasm-bindgen --target web` (see scripts/build_web.sh) -->
    <script type="module">
      import init from "./edirstat-web.js";
      init();
    </script>
  </body>
</html>
