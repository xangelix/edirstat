name: Package Production Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    name: Package Linux Production
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch-rust-nightly-pin-common:latest
      options: --user root # How I wish this were GitLab

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Compile optimized release binary
        run: cargo build --release

      - name: Stage Artifact
        run: |
          mkdir -p staging
          cp target/release/edirstat staging/edirstat-linux-x86_64

      - name: Store Production Binary as Private Artifact
        uses: actions/upload-artifact@v7
        with:
          name: edirstat-linux-x86_64
          path: staging/edirstat-linux-x86_64

      # - name: Upload Asset to GitHub Release
      #   uses: softprops/action-gh-release@v3
      #   with:
      #     files: staging/edirstat-linux-x86_64
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Package Windows Production (Inno Setup)
    runs-on: windows-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          target: x86_64-pc-windows-msvc

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Compile optimized release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Restructure Build Path
        run: |
          mkdir -Force target\release
          cp -Force target\x86_64-pc-windows-msvc\release\edirstat.exe target\release\edirstat.exe

      - name: Compile Inno Setup Installer
        shell: powershell
        run: |
          # 1. Extract the version string from Cargo.toml
          $version = (Select-String -Path Cargo.toml -Pattern '^version\s*=\s*"(.*?)"').Matches.Groups[1].Value
          echo "Detected Cargo Version: $version"

          # 2. Compile passing the version dynamically
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss

      - name: Prepare Portable ZIP
        run: |
          compress-archive -Path target\release\edirstat.exe -DestinationPath staging\edirstat-windows-portable-x86_64.zip

      - name: Store Portable ZIP as Private Artifact
        uses: actions/upload-artifact@v7
        with:
          name: edirstat-windows-portable-x86_64.zip
          path: staging\edirstat-windows-portable-x86_64.zip

      - name: Store Production Installer as Private Artifact
        uses: actions/upload-artifact@v7
        with:
          name: edirstat-setup-x86_64.exe
          path: staging\edirstat-setup-x86_64.exe

      # - name: Upload Portable ZIP to GitHub Release
      #   uses: softprops/action-gh-release@v3
      #   with:
      #     files: staging/edirstat-windows-portable-x86_64.zip
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Upload Installer to GitHub Release
      #   uses: softprops/action-gh-release@v3
      #   with:
      #     files: staging/edirstat-setup-x86_64.exe
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Package macOS Production
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-06-15
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Compile optimized release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Structure App Bundle & Ad-Hoc Sign
        run: |
          # 1. Create standard macOS App Bundle layout
          APP_DIR="staging/eDirStat.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          # 2. Move compiled binary into position
          cp target/${{ matrix.target }}/release/edirstat "$APP_DIR/Contents/MacOS/edirstat"

          # 3. Automatically compile the .icns asset using standard Apple tooling
          mkdir -p eDirStat.iconset
          sips -z 16 16     assets/img/icon_256x.png --out eDirStat.iconset/icon_16x16.png
          sips -z 32 32     assets/img/icon_256x.png --out eDirStat.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/img/icon_256x.png --out eDirStat.iconset/icon_32x32.png
          sips -z 64 64     assets/img/icon_256x.png --out eDirStat.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/img/icon_256x.png --out eDirStat.iconset/icon_128x128.png
          sips -z 256 256   assets/img/icon_256x.png --out eDirStat.iconset/icon_128x128@2x.png
          cp assets/img/icon_256x.png eDirStat.iconset/icon_256x256.png

          iconutil -c icns eDirStat.iconset --output "$APP_DIR/Contents/Resources/icon.icns"

          # 4. Generate the Info.plist meta file with icon mapping links
          cat <<EOF > "$APP_DIR/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>edirstat</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundleIdentifier</key>
              <string>to.cody.edirstat</string>
              <key>CFBundleName</key>
              <string>eDirStat</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.1.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
          </dict>
          </plist>
          EOF

          # 5. Cryptographically sign the bundle locally with sandboxing entitlements
          codesign --force --options runtime --entitlements entitlements.plist -s - "$APP_DIR"

          # 6. Compress app bundle into a standard .zip archive to protect folder permissions
          cd staging
          zip -r "../edirstat-macos-${{ matrix.target }}.zip" eDirStat.app

      - name: Store macOS Package as Private Artifact
        uses: actions/upload-artifact@v7
        with:
          name: edirstat-macos-${{ matrix.target }}.zip
          path: edirstat-macos-${{ matrix.target }}.zip

      # - name: Upload Asset to GitHub Release
      #   uses: softprops/action-gh-release@v3
      #   with:
      #     files: edirstat-macos-${{ matrix.target }}.zip
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-itchio:
    name: Deploy to itch.io (Multivers & Installers)
    runs-on: ubuntu-latest
    needs: [build-windows]
    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch-rust-nightly-pin-common:latest
      options: --user root # How I wish this were GitLab

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Configure safe directory for Git
        run: git config --global --add safe.directory "*"

      - name: Download Windows Installer Artifact
        uses: actions/download-artifact@v8
        with:
          name: edirstat-setup-x86_64.exe
          path: staging-windows-installer

      - name: Run multivers compilation script
        run: ./scripts/build_local_multivers.sh

      - name: Build Arch Linux Pacman Package as tux user
        run: |
          # 1. Determine version
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          # 2. Stage binary in /home/tux matching manual source name
          cp target/x86_64-unknown-linux-gnu/release/edirstat_multivers /home/tux/edirstat-$VERSION-portable-x86_64
          chown tux:tux /home/tux/edirstat-$VERSION-portable-x86_64

          # 3. Clone and build as the tux user to bypass makepkg root restriction
          sudo -u tux -i bash -c "
            cd /home/tux
            rm -rf edirstat-bin
            git clone https://aur.archlinux.org/edirstat-bin.git
            cd edirstat-bin
            
            # Place precompiled binary in build directory
            cp /home/tux/edirstat-$VERSION-portable-x86_64 ./
            
            # Update version properties
            sed -i 's/^pkgver=.*/pkgver='$VERSION'/' PKGBUILD
            sed -i 's/^pkgrel=.*/pkgrel=1/' PKGBUILD
            
            # Automatically resolve checksums for the local binary and download metadata
            updpkgsums
            
            # Build and package
            makepkg -s --noconfirm
          "

          # 4. Copy the compiled package back to workspace
          mkdir -p staging-linux-installer
          cp /home/tux/edirstat-bin/*.pkg.tar.zst staging-linux-installer/

      - name: Package and Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          # 1. Determine version
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}" # strip 'v' prefix if present
          echo "Deploying version: $VERSION"

          # 2. Stage Linux binary
          mkdir -p staging-linux
          cp target/x86_64-unknown-linux-gnu/release/edirstat_multivers staging-linux/edirstat
          chmod +x staging-linux/edirstat

          # 3. Stage Windows binary
          mkdir -p staging-windows
          cp target/x86_64-pc-windows-gnu/release/edirstat_multivers.exe staging-windows/edirstat.exe

          # 4. Ensure butler is available in PATH, downloading it as a fallback if necessary
          if ! command -v butler &> /dev/null; then
            echo "butler not found in PATH, installing..."
            curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
            unzip -o butler.zip -d /usr/local/bin
            rm butler.zip
          fi

          # 5. Push all packages to itch.io
          butler push staging-windows/ xangelix/edirstat:windows-portable --userversion "$VERSION"
          butler push staging-windows-installer/ xangelix/edirstat:windows-setup --userversion "$VERSION"
          butler push staging-linux/ xangelix/edirstat:linux-portable --userversion "$VERSION"
          butler push staging-linux-installer/ xangelix/edirstat:linux-setup --userversion "$VERSION"
