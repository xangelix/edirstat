name: CI & Release Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test-linux:
    name: Tests (Linux Container)
    runs-on: ubuntu-latest
    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch-rust-nightly-pin-common:latest
      options: --user root # How I wish this were GitLab

    steps:
      - uses: actions/checkout@v6

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check for unused dependencies
        run: cargo shear

      - name: Run tests (no default features)
        run: cargo test --no-default-features

      - name: Run tests
        run: cargo test

  test-macos:
    name: Tests (macOS Native)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

  build-linux-windows:
    name: Build & Upload Linux/Windows (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos]
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    container:
      image: registry.gitlab.com/xangelix-pub/containers/arch-rust-nightly-pin-common:latest
      options: --user root # How I wish this were GitLab

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            asset_name: edirstat-linux-x86_64
            binary_path: target/release/edirstat
            setup_cmd: echo "Using native target architecture."
            build_cmd: cargo build --release

          - target: x86_64-pc-windows-gnu
            asset_name: edirstat-windows-x86_64.exe
            binary_path: target/x86_64-pc-windows-gnu/release/edirstat.exe
            setup_cmd: |
              paru -Syu --noconfirm mingw-w64
              rustup target add x86_64-pc-windows-gnu
            build_cmd: cargo build --release --target x86_64-pc-windows-gnu

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Target Dependencies
        run: ${{ matrix.setup_cmd }}

      - name: Compile optimized release binary
        run: ${{ matrix.build_cmd }}

      - name: Stage Release Asset
        run: |
          mkdir -p staging
          cp ${{ matrix.binary_path }} staging/${{ matrix.asset_name }}

      - name: Upload Asset to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: staging/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Asset as Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: staging/${{ matrix.asset_name }}

  build-macos:
    name: Build & Package macOS (${{ matrix.target }})
    runs-on: macos-latest
    needs: [test-linux, test-macos]
    if: github.event_name == 'release' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            asset_name: edirstat-macos-arm64
            binary_path: target/aarch64-apple-darwin/release/edirstat
          - target: x86_64-apple-darwin
            asset_name: edirstat-macos-x86_64
            binary_path: target/x86_64-apple-darwin/release/edirstat

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-15
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Compile optimized release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Structure App Bundle & Ad-Hoc Sign
        run: |
          # 1. Create standard macOS App Bundle layout
          APP_DIR="staging/eDirStat.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          # 2. Move compiled binary into position
          cp ${{ matrix.binary_path }} "$APP_DIR/Contents/MacOS/edirstat"

          # 3. Automatically compile the .icns asset using standard Apple tooling
          mkdir -p eDirStat.iconset
          sips -z 16 16     assets/img/icon_256x.png --out eDirStat.iconset/icon_16x16.png
          sips -z 32 32     assets/img/icon_256x.png --out eDirStat.iconset/icon_16x16@2x.png
          sips -z 32 32     assets/img/icon_256x.png --out eDirStat.iconset/icon_32x32.png
          sips -z 64 64     assets/img/icon_256x.png --out eDirStat.iconset/icon_32x32@2x.png
          sips -z 128 128   assets/img/icon_256x.png --out eDirStat.iconset/icon_128x128.png
          sips -z 256 256   assets/img/icon_256x.png --out eDirStat.iconset/icon_128x128@2x.png
          cp assets/img/icon_256x.png eDirStat.iconset/icon_256x256.png

          iconutil -c icns eDirStat.iconset --output "$APP_DIR/Contents/Resources/icon.icns"

          # 4. Generate the Info.plist meta file with icon mapping links
          cat <<EOF > "$APP_DIR/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>edirstat</string>
              <key>CFBundleIconFile</key>
              <string>icon.icns</string>
              <key>CFBundleIdentifier</key>
              <string>to.cody.edirstat</string>
              <key>CFBundleName</key>
              <string>eDirStat</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.1.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15</string>
          </dict>
          </plist>
          EOF

          # 5. Cryptographically sign the bundle locally with sandboxing entitlements
          codesign --force --options runtime --entitlements entitlements.plist -s - "$APP_DIR"

          # 6. Compress app bundle into a standard .zip archive to protect folder permissions
          cd staging
          zip -r "../${{ matrix.asset_name }}.zip" eDirStat.app
          cd ..

      - name: Upload Asset to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.asset_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Asset as Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}.zip
          path: ${{ matrix.asset_name }}.zip
