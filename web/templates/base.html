<!DOCTYPE html>
<html lang="{{ lang | default(value="en") }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }} — {{ config.extra.tagline }}{% endblock title %}</title>
    <meta name="description" content="{% block description %}{{ config.description }}{% endblock description %}">
    <meta name="theme-color" content="#101014">
    <link rel="canonical" href="{{ config.base_url | safe }}{{ current_path | default(value="/") | safe }}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ config.title }}">
    <meta property="og:url" content="{{ config.base_url | safe }}{{ current_path | default(value="/") | safe }}">
    <meta property="og:title" content="{{ config.title }} — {{ config.extra.tagline }}">
    <meta property="og:description" content="{{ config.description }}">
    <meta property="og:image" content="{{ config.base_url | safe }}/{{ config.extra.og_image | safe }}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:locale" content="en_US">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ config.title }} — {{ config.extra.tagline }}">
    <meta name="twitter:description" content="{{ config.description }}">
    <meta name="twitter:image" content="{{ config.base_url | safe }}/{{ config.extra.og_image | safe }}">

    <!-- Structured data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "{{ config.title | safe }}",
        "url": "{{ config.base_url | safe }}",
        "description": "{{ config.description | safe }}",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": ["Windows", "macOS", "Linux"],
        "softwareVersion": "{{ config.extra.version | safe }}",
        "license": "https://opensource.org/licenses/MIT",
        "isAccessibleForFree": true,
        "downloadUrl": "{{ config.extra.itch_io_url | safe }}",
        "codeRepository": "{{ config.extra.github_url | safe }}",
        "screenshot": "{{ config.base_url | safe }}/{{ config.extra.og_image | safe }}",
        "author": {
            "@type": "Person",
            "name": "xangelix",
            "url": "{{ config.extra.github_url | safe }}"
        }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Stylesheets & Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ get_url(path="favicon.ico") | safe }}">
    <link rel="stylesheet" href="{{ get_url(path="assets/main.css", cachebust=true) | safe }}">
</head>
<body>
    {% block content %}{% endblock content %}
    
    <!-- Scripts -->
    <script type="module" src="{{ get_url(path="assets/main.js", cachebust=true) | safe }}"></script>
</body>
</html>
